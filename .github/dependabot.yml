# .github/dependabot.yml
#
# WHAT THIS IS:
# Dependabot is an automated worker provided by GitHub.
# It checks your dependencies, and if there's a newer version or 
# a security vulnerability, it automatically creates a Pull Request 
# for you to review and merge.
#
# WHY WE NEED THIS:
# - npm audit warns you, but you still have to manually run npm update.
# - Dependabot does the work for you. It opens a PR, which runs your
#   ci.yml tests. If the tests pass, you know the update is safe to merge!

version: 2
updates:
  # 1. Update our Node.js Packages (npm)
  - package-ecosystem: "npm"
    directory: "/"              # Where our package.json lives
    schedule:
      interval: "weekly"        # Check for updates every week
    labels:
      - "dependencies"          # Auto-label the PRs so they are easy to find

  # 2. Update our GitHub Actions (the @vX tags in our workflows)
  - package-ecosystem: "github-actions"
    directory: "/"              # Where .github/workflows lives
    schedule:
      interval: "weekly"        # Check for updates every week
    labels:
      - "github-actions"        # Auto-label the PRs
    
    # We don't want an overwhelming number of PRs every week, 
    # so we cap the max number of open PRs Dependabot can have at once.
    open-pull-requests-limit: 3
